<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>🎰 彩票号码生成器</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:"PingFang SC","Microsoft YaHei",sans-serif;background:linear-gradient(135deg,#1a1a2e 0%,#16213e 100%);min-height:100vh;padding:15px}
.container{max-width:540px;margin:0 auto;background:rgba(255,255,255,0.05);border-radius:20px;padding:20px}
h1{text-align:center;color:#fff;font-size:20px;margin-bottom:12px}
.type-selector{display:flex;flex-wrap:wrap;gap:6px;justify-content:center;margin-bottom:12px}
.type-btn{padding:8px 12px;border:2px solid rgba(255,255,255,0.2);background:rgba(255,255,255,0.05);color:#aaa;border-radius:8px;cursor:pointer;font-size:12px}
.type-btn.active{background:#e94560;border-color:#e94560;color:#fff}
.panel{background:rgba(255,255,255,0.03);border-radius:12px;padding:12px;margin-bottom:12px}
.ptitle{color:#e94560;font-size:13px;font-weight:bold;margin-bottom:10px}
.row{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;gap:8px}
.row:last-child{margin-bottom:0}
.lbl{color:#aaa;font-size:12px}
.lbl small{display:block;color:#666;font-size:10px}
.inp{width:50px;padding:5px;background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.2);border-radius:4px;color:#fff;font-size:12px;text-align:center}
.zinp{width:36px;padding:4px;background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.2);border-radius:4px;color:#fff;font-size:12px;text-align:center}
.sep{color:#666;font-size:11px;margin:0 2px}
.sel{padding:5px 8px;background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.2);border-radius:4px;color:#fff;font-size:12px}
.sel option{background:#1a1a2e}
.phdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.ptitle2{color:#ffd700;font-size:13px;font-weight:bold}
.rbtn{padding:4px 10px;background:rgba(255,215,0,0.2);border:1px solid rgba(255,215,0,0.4);border-radius:6px;color:#ffd700;font-size:11px;cursor:pointer}
.pstatus{color:#888;font-size:11px;margin-bottom:8px}
.hlist,.clist{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:6px}
.hlbl,.clbl{width:100%;font-size:10px;color:#666;margin-bottom:4px}
.hball{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:bold;color:#fff}
.hball.red{background:linear-gradient(145deg,#ff4444,#cc0000)}
.hball.blue{background:linear-gradient(145deg,#4488ff,#0066cc)}
.cold{opacity:0.4}
.psw{display:flex;align-items:center;gap:8px;margin-top:8px;padding-top:8px;border-top:1px solid rgba(255,255,255,0.05);flex-wrap:wrap}
.sw{position:relative;width:40px;height:22px;flex-shrink:0}
.sw input{opacity:0;width:0;height:0}
.sld{position:absolute;cursor:pointer;top:0;left:0;right:0;bottom:0;background:rgba(255,255,255,0.1);border-radius:22px;transition:0.3s}
.sld:before{position:absolute;content:"";height:16px;width:16px;left:3px;bottom:3px;background:#fff;border-radius:50%;transition:0.3s}
input:checked+.sld{background:#00c851}
input:checked+.sld:before{transform:translateX(18px)}
.swlbl{color:#aaa;font-size:12px}
.ratio{display:flex;align-items:center;gap:6px;width:100%;margin-top:8px;padding-top:8px;border-top:1px solid rgba(255,255,255,0.05)}
.rati{color:#aaa;font-size:11px;white-space:nowrap}
input[type=range]{-webkit-appearance:none;width:50px;height:6px;background:rgba(255,255,255,0.1);border-radius:3px;outline:none}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:14px;height:14px;background:#ffd700;border-radius:50%;cursor:pointer}
.ratval{color:#ffd700;font-size:12px;font-weight:bold;min-width:30px;text-align:center}
.gsel{display:flex;align-items:center;justify-content:center;gap:8px;margin-bottom:12px}
.gsel span{color:#888;font-size:12px}
.gsel select{padding:5px 10px;background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.2);border-radius:6px;color:#fff;font-size:12px}
.gsel select option{background:#1a1a2e}
.narea{min-height:70px;margin-bottom:10px}
.srow{display:flex;align-items:center;justify-content:center;flex-wrap:wrap;gap:3px;margin-bottom:6px;padding:6px;background:rgba(255,255,255,0.03);border-radius:8px}
.slbl{color:#666;font-size:10px;margin-right:4px;min-width:20px}
.zt{font-size:9px;color:#666;padding:2px 4px;background:rgba(255,255,255,0.05);border-radius:3px;margin-right:3px}
.zt.z1{color:#ff6b6b}
.zt.z2{color:#ffd700}
.zt.z3{color:#4d9fff}
.zsl{color:#444;margin:0 2px}
.ball{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:bold;color:#fff;animation:pop 0.3s ease-out}
.ball.red{background:linear-gradient(145deg,#ff6b6b,#ee5a5a)}
.ball.blue{background:linear-gradient(145deg,#4d9fff,#3a8fe6)}
.ball.gold{background:linear-gradient(145deg,#ffd700,#ffb700)}
.plus{color:#fff;font-size:16px;opacity:0.5;margin:0 2px}
.btrow{display:flex;gap:8px;margin-bottom:12px}
.gbtn{flex:1;padding:10px;background:linear-gradient(145deg,#e94560,#ff6b6b);border:none;border-radius:8px;color:#fff;font-size:13px;font-weight:bold;cursor:pointer}
.cbtn{flex:1;padding:10px;background:linear-gradient(145deg,#00c851,#00a044);border:none;border-radius:8px;color:#fff;font-size:13px;font-weight:bold;cursor:pointer}
.cbtn.copied{background:linear-gradient(145deg,#00a044,#008836)}
.hist h3{color:#888;font-size:11px;margin-bottom:6px}
.histlist{max-height:80px;overflow-y:auto}
.hitem{color:#666;font-size:10px;padding:4px 6px;background:rgba(255,255,255,0.03);border-radius:4px;margin-bottom:2px;font-family:Consolas,monospace}
.tip{text-align:center;color:#888;font-size:10px;margin-top:10px;font-style:italic}
@keyframes pop{0%{transform:scale(0);opacity:0}70%{transform:scale(1.1)}100%{transform:scale(1);opacity:1}}
</style>
</head>
<body>
<div class="container">
<h1>🎰 彩票号码生成器</h1>
<div class="type-selector">
<button class="type-btn active" onclick="st('ssq')">双色球</button>
<button class="type-btn" onclick="st('dlt')">大乐透</button>
<button class="type-btn" onclick="st('qxc')">七星彩</button>
<button class="type-btn" onclick="st('fc3d')">3D直选</button>
<button class="type-btn" onclick="st('pl5')">排列五</button>
<button class="type-btn" onclick="st('kl8')">快乐8</button>
</div>
<div class="panel" id="hcPanel">
<div class="phdr"><span class="ptitle2">🔥 热冷号分析</span><button class="rbtn" id="rBtn" onclick="fh()">🔄 刷新数据</button></div>
<div class="pstatus" id="pStatus">点击刷新获取最新开奖数据</div>
<div class="hlist" id="hList"></div>
<div class="clist" id="cList"></div>
<div class="psw">
<label class="sw"><input type="checkbox" id="eHot" checked><span class="sld"></span></label>
<span class="swlbl">启用热冷权重</span>
<div class="ratio">
<span class="rati">热:</span>
<input type="range" id="hRat" min="0" max="10" value="7" oninput="syR()">
<span class="ratval" id="rDis">7</span>
<span class="rati">:冷:</span>
<input type="range" id="cRat" min="0" max="10" value="3" oninput="syRr()">
</div>
</div>
</div>
<div class="panel" id="sumPanel">
<div class="ptitle">🔢 红球和值范围</div>
<div class="row"><div class="lbl">红球总和范围<small>双色球:21-183 | 大乐透:15-175</small></div><div><input type="number" class="inp" id="sMin" value="60"><span class="sep">~</span><input type="number" class="inp" id="sMax" value="120"></div></div>
</div>
<div class="panel" id="zonePanel">
<div class="ptitle">⚙️ 区域设置</div>
<div class="row"><div class="lbl">红球分区<small>1区:01-11 | 2区:12-22 | 3区:23-33</small></div><div><input type="number" class="zinp" id="r1" value="2"><span class="sep">+</span><input type="number" class="zinp" id="r2" value="2"><span class="sep">+</span><input type="number" class="zinp" id="r3" value="2"></div></div>
<div class="row" id="ssqBRow"><div class="lbl">蓝球分区 <small>1区:01-08 | 2区:09-16</small></div><select class="sel" id="bZone"><option value="0">不限</option><option value="1">1区</option><option value="2">2区</option></select></div>
<div class="row" id="dltBRow" style="display:none"><div class="lbl">蓝球分区 <small>1区:01-06 | 2区:07-12</small></div><div><span style="color:#888;font-size:11px">第1:</span><select class="sel" id="b1Z"><option value="0">不限</option><option value="1">1区</option><option value="2">2区</option></select><span style="color:#888;font-size:11px;margin-left:8px">第2:</span><select class="sel" id="b2Z"><option value="0">不限</option><option value="1">1区</option><option value="2">2区</option></select></div></div>
</div>
<div class="panel" id="kl8Panel" style="display:none">
<div class="ptitle">⚙️ 单双设置</div>
<div class="row"><div class="lbl">单双比例 <small>单数:双数</small></div><select class="sel" id="kRatio"><option value="0">不限</option><option value="5:5">5:5</option><option value="6:4">6:4</option><option value="7:3">7:3</option><option value="4:6">4:6</option><option value="3:7">3:7</option></select></div>
</div>
<div class="gsel"><span>生成组数:</span><select id="gCnt" onchange="gen()"><option value="1">1组</option><option value="2">2组</option><option value="3">3组</option><option value="4">4组</option><option value="5">5组</option><option value="6">6组</option><option value="7">7组</option><option value="8">8组</option><option value="9">9组</option><option value="10">10组</option></select></div>
<div class="narea" id="nArea"></div>
<div class="btrow"><button class="gbtn" onclick="gen()">🎲 重新生成</button><button class="cbtn" id="cBtn" onclick="cpy()">📋 一键复制</button></div>
<div class="hist"><h3>📝 历史记录</h3><div class="histlist" id="hList2"></div></div>
<p class="tip" id="tip">✨ 点击按钮，命运掌握在你手中 ✨</p>
</div>
<script>
var ct='ssq',cS=[],hist=[],rH={},bH={},ld=[];
var tipS=["✨ 小赌怡情，大赌伤身 ✨","💫 梦想还是要有的，万一中了呢 💫","🎯 命运给的机会，要好好珍惜 🎯","🍀 今日宜开奖 🍀","🌟 哈仔祝你好运 🌟"];

// 预设数据 - 30期样本
var SSQ=[[3,9,16,18,24,32,4],[1,4,13,17,26,32,9],[5,11,22,27,30,33,14],[8,12,15,21,25,28,2],[2,7,13,19,24,31,6],[4,10,14,22,27,29,11],[1,6,11,18,23,30,5],[3,9,15,20,26,33,8],[5,12,17,19,28,32,3],[2,7,14,21,25,31,7],[4,8,13,16,24,29,12],[6,10,18,22,27,30,1],[1,5,11,15,23,28,9],[3,7,14,19,26,32,4],[2,9,12,17,20,33,6],[4,6,13,18,24,31,10],[5,8,15,21,27,29,3],[1,10,14,19,25,30,8],[3,7,11,16,22,28,5],[2,6,12,17,23,32,13],[4,9,13,20,26,33,2],[5,10,15,18,24,29,7],[1,8,14,21,27,31,11],[3,6,11,19,25,30,6],[2,7,12,16,22,28,4],[4,9,14,18,23,32,9],[5,10,13,17,20,29,1],[1,6,11,15,24,31,8],[3,8,12,19,26,33,5],[2,7,14,21,27,30,10]];
var DLT=[[[3,8,15,22,31],[4,11]],[[1,6,12,19,28],[3,9]],[[5,9,14,24,32],[2,7]],[[2,7,11,18,27],[5,12]],[[4,10,16,21,29],[1,8]],[[3,8,13,20,25],[4,10]],[[1,6,15,23,30],[2,11]],[[5,9,12,19,33],[3,7]],[[2,7,14,22,28],[5,9]],[[4,8,11,17,26],[1,12]],[[3,10,16,24,31],[4,8]],[[1,6,13,20,29],[2,6]],[[5,9,15,18,27],[3,11]],[[2,7,12,21,32],[5,10]],[[4,8,14,19,25],[1,7]],[[3,10,17,23,30],[4,9]],[[1,6,11,16,28],[2,12]],[[5,9,13,22,33],[3,8]],[[2,7,15,20,29],[5,11]],[[4,8,12,18,26],[1,6]],[[3,10,14,24,31],[4,10]],[[1,6,16,19,27],[2,7]],[[5,9,11,21,30],[3,9]],[[2,7,13,17,25],[5,12]],[[4,8,15,23,32],[1,8]]];
var KL8=[[3,7,12,18,24,29,33,38,42,48],[5,8,11,15,21,27,32,36,41,45],[2,6,9,14,19,23,28,34,39,44],[4,10,13,17,22,26,31,35,40,46],[1,5,8,11,16,20,25,30,37,43],[6,9,12,15,18,24,29,33,38,42],[3,7,10,14,19,22,27,31,36,41],[2,8,11,16,21,25,28,34,39,44],[5,9,13,17,23,26,32,37,40,45],[1,6,10,14,18,20,24,30,35,42]];

function st(t){ct=t;document.querySelectorAll('.type-btn').forEach(function(b){b.classList.remove('active')});event.target.classList.add('active');
document.getElementById('sumPanel').style.display=(t==='ssq'||t==='dlt')?'block':'none';
document.getElementById('zonePanel').style.display=(t==='ssq'||t==='dlt')?'block':'none';
document.getElementById('ssqBRow').style.display=(t==='ssq')?'flex':'none';
document.getElementById('dltBRow').style.display=(t==='dlt')?'flex':'none';
document.getElementById('kl8Panel').style.display=(t==='kl8')?'block':'none';
document.getElementById('hcPanel').style.display=(t==='ssq'||t==='dlt'||t==='kl8')?'block':'none';
if(t==='dlt'){document.getElementById('sMin').min=15;document.getElementById('sMin').max=175;document.getElementById('sMax').min=15;document.getElementById('sMax').max=175;}
else{document.getElementById('sMin').value=60;document.getElementById('sMin').min=21;document.getElementById('sMin').max=183;document.getElementById('sMax').value=120;document.getElementById('sMax').min=21;document.getElementById('sMax').max=183;}
ldp();gen();}

function syR(){var h=parseInt(document.getElementById('hRat').value);document.getElementById('rDis').textContent=h;document.getElementById('cRat').value=10-h;}
function syRr(){var c=parseInt(document.getElementById('cRat').value);document.getElementById('rDis').textContent=10-c;document.getElementById('hRat').value=10-c;}

// 加载预设数据
function ldp(){rH={};bH={};ld=[];
if(ct==='ssq'){SSQ.forEach(function(d){var rs=d.slice(0,6);var bl=d[6];ld.push({rs:rs,bl:bl});rs.forEach(function(n){rH[n]=(rH[n]||0)+1});bH[bl]=(bH[bl]||0)+1;});}
else if(ct==='dlt'){DLT.forEach(function(d){var rs=d[0];var bls=d[1];ld.push({rs:rs,bls:bls});rs.forEach(function(n){rH[n]=(rH[n]||0)+1});bls.forEach(function(n){bH[n]=(bH[n]||0)+1});});}
else if(ct==='kl8'){KL8.forEach(function(ns){ld.push({ns:ns});ns.forEach(function(n){rH[n]=(rH[n]||0)+1});});}
uhD();document.getElementById('pStatus').textContent='✅ 已加载'+ld.length+'期预设数据';}

// 尝试获取网络数据
async function fh(){
var btn=document.getElementById('rBtn'),status=document.getElementById('pStatus');
btn.disabled=true;btn.textContent='⏳ 获取中...';
status.textContent='正在尝试获取最新数据...';
rH={};bH={};ld=[];
try{
var url=ct==='ssq'?'https://datachart.500.com/ssq/history/newinc/history.php?start=1&end=30':
ct==='dlt'?'https://datachart.500.com/dlt/history/newinc/history.php?start=1&end=30':
ct==='kl8'?'https://datachart.500.com/kl8/history/newinc/history.php?start=1&end=20':'';
if(url){
var resp=await fetch(url);
if(!resp.ok)throw new Error('Network error');
var html=await resp.text();
var p=new DOMParser();var d=p.parseFromString(html,'text/html');
var ws=d.querySelectorAll('tr[tclass="t_tr1"], tr[tclass="t_tr2"]');
ws.forEach(function(row){
var cs=row.querySelectorAll('td');
if(ct==='ssq'&&cs.length>=8){var rs=[];for(var i=1;i<=6;i++){var n=parseInt(cs[i].textContent.trim());if(n)rs.push(n);}var bl=parseInt(cs[7].textContent.trim());if(rs.length===6&&bl){ld.push({rs:rs,bl:bl});rs.forEach(function(n){rH[n]=(rH[n]||0)+1});bH[bl]=(bH[bl]||0)+1;}}
else if(ct==='dlt'&&cs.length>=8){var rs=[];for(var i=1;i<=5;i++){var n=parseInt(cs[i].textContent.trim());if(n)rs.push(n);}var bls=[parseInt(cs[6].textContent.trim()),parseInt(cs[7].textContent.trim())];if(rs.length===5&&bls[0]&&bls[1]){ld.push({rs:rs,bls:bls});rs.forEach(function(n){rH[n]=(rH[n]||0)+1});bls.forEach(function(n){bH[n]=(bH[n]||0)+1});}}
else if(ct==='kl8'&&cs.length>=21){var ns=[];for(var i=1;i<=20;i++){var n=parseInt(cs[i].textContent.trim());if(n)ns.push(n);}if(ns.length===20){ld.push({ns:ns});ns.forEach(function(n){rH[n]=(rH[n]||0)+1});}}
});
}
if(ld.length>0){uhD();status.textContent='✅ 已获取'+ld.length+'期最新数据';}
else{ldp();status.textContent='⚠️ 网络获取失败，已加载预设数据';}
}catch(e){
ldp();status.textContent='⚠️ 网络获取失败，已加载预设数据';
}
btn.disabled=false;btn.textContent='🔄 刷新数据';
}

function uhD(){
var hl=document.getElementById('hList'),cl=document.getElementById('cList');
var bc=ct==='kl8'?'blue':'red';
var es=Object.keys(rH).map(function(k){return{num:parseInt(k),c:rH[k]}});es.sort(function(a,b){return b.c-a.c});
var ht=es.slice(0,6).map(function(e){return e.num});var cd=es.slice(-6).map(function(e){return e.num});
hl.innerHTML='<span class="hlbl">🔥 热号:</span>'+ht.map(function(n){return'<div class="hball '+bc+'">'+String(n).padStart(2,'0')+'</div>'}).join('');
cl.innerHTML='<span class="clbl">❄️ 冷号:</span>'+cd.map(function(n){return'<div class="hball '+bc+' cold">'+String(n).padStart(2,'0')+'</div>'}).join('');
}

function pk(mn,mx,c){var pl=[];for(var i=mn;i<=mx;i++)pl.push(i);var r=[];for(var i=0;i<c&&pl.length>0;i++){var ix=Math.floor(Math.random()*pl.length);r.push(pl.splice(ix,1)[0]);}return r;}

// 根据彩种和红球数量计算热冷权重
function getHotWeight(){
if(ct==='kl8')return 1.0; // 快乐8固定权重
var sliderVal=parseInt(document.getElementById('hRat').value);
var baseWeight=sliderVal/10+0.3; // 0.3~1.3
var redCount=ct==='ssq'?6:5; // 双色球6个，大乐透5个
var redTotal=ct==='ssq'?33:35; // 总数
// 红球越多，权重影响越大
var ratio=baseWeight*(redCount/redTotal)*10;
return Math.max(0.5,Math.min(2,ratio));
}

function wp(h,mn,mx,c,hW){var pl=[];for(var i=mn;i<=mx;i++)pl.push(i);var ws=pl.map(function(n){return(h[n]||0)*hW+1;});var tot=ws.reduce(function(a,b){return a+b},0);var r=[],uPl=pl.slice(),uWts=ws.slice();
for(var i=0;i<c&&uPl.length>0;i++){var rn=Math.random()*tot,cs=0;for(var j=0;j<uPl.length;j++){cs+=uWts[j];if(cs>=rn){r.push(uPl[j]);tot-=uWts[j];uPl.splice(j,1);uWts.splice(j,1);break;}if(r.length<=i){var ix=Math.floor(Math.random()*uPl.length);r.push(uPl.splice(ix,1)[0]);tot-=uWts.splice(ix,1)[0];}}return r;}

function gRs(sMn,sMx,r1,r2,r3,uH,hW,mR){var mT=500;var tot=r1+r2+r3;var nd=mR;
if(tot!==nd&&!uH){if(tot<nd)r3+=(nd-tot);else{var ex=tot-nd;if(r3>ex)r3-=ex;else if(r2>ex)r2-=ex;else r1-=ex;}}
for(var i=0;i<mT;i++){var rs;
if(uH&&Object.keys(rH).length>0)rs=wp(rH,1,mR,nd,hW).sort(function(a,b){return a-b});
else{var z1=pk(1,11,r1);var z2=pk(12,22,r2);var z3=pk(23,mR,r3);rs=z1.concat(z2).concat(z3);while(rs.length<nd){var n=Math.floor(Math.random()*mR)+1;if(rs.indexOf(n)===-1)rs.push(n);}rs.sort(function(a,b){return a-b});}

ion(item,i){var d=item.data,t=item.type;if(t==='ssq'){txt+=(i+1)+'. '+d.rs.map(function(n){return String(n).padStart(2,'0')}).join(' ')+' + '+String(d.bl).padStart(2,'0')+'\n';}else if(t==='dlt'){txt+=(i+1)+'. '+d.rs.map(function(n){return String(n).padStart(2,'0')}).join(' ')+' + '+d.bls.map(function(n){return String(n).padStart(2,'0')}).join(' ')+'\n';}else if(t==='kl8'){txt+=(i+1)+'. '+d.map(function(n){return String(n).padStart(2,'0')}).join(' ')+'\n';}else{txt+=(i+1)+'. '+d.join('')+'\n';}});navigator.clipboard.writeText(txt).then(function(){var btn=document.getElementById('cBtn');btn.textContent='✅ 已复制';btn.classList.add('copied');setTimeout(function(){btn.textContent='📋 一键复制';btn.classList.remove('copied');},2000);});}ldp();</script></body></html>
