<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>🎰 彩票生成器测试版</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:sans-serif;background:#1a1a2e;min-height:100vh;padding:20px;color:#fff}
.container{max-width:500px;margin:0 auto;background:rgba(255,255,255,0.1);border-radius:15px;padding:20px}
h1{text-align:center;margin-bottom:15px;font-size:22px}
.type-btns{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin-bottom:15px}
.type-btn{padding:8px 14px;border:2px solid #555;border-radius:8px;background:#333;color:#aaa;cursor:pointer;font-size:13px}
.type-btn.active{background:#e94560;border-color:#e94560;color:#fff}
.panel{background:rgba(255,255,255,0.05);border-radius:10px;padding:12px;margin-bottom:12px}
.ptitle{color:#ffd700;font-size:14px;font-weight:bold;margin-bottom:8px}
.status{color:#888;font-size:12px;margin-bottom:8px;min-height:20px}
.hlist,.clist{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:8px}
.hball{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:bold;color:#fff;background:#ff4444}
.hball.blue{background:#4488ff}
.cold{opacity:0.4}
.ratio-row{display:flex;align-items:center;gap:10px;margin-top:10px}
.ratio-row label{font-size:12px;color:#aaa}
.ratio-row input{width:80px}
.ratio-row span{font-size:12px;color:#ffd700;min-width:30px}
.slider-row{display:flex;align-items:center;gap:10px;margin-top:8px}
.slider-row label{font-size:12px;color:#aaa;width:60px}
.slider-row input[type=range]{flex:1;height:6px}
.numbers{min-height:80px;background:rgba(0,0,0,0.2);border-radius:8px;padding:10px;margin-bottom:12px;display:flex;flex-wrap:wrap;gap:6px;justify-content:center;align-items:center}
.ball{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:bold;color:#fff;background:linear-gradient(145deg,#ff6b6b,#ee5a5a)}
.ball.blue{background:linear-gradient(145deg,#4d9fff,#3a8fe6)}
.ball.gold{background:linear-gradient(145deg,#ffd700,#ffb700)}
.btns{display:flex;gap:10px}
button{flex:1;padding:12px;border:none;border-radius:8px;font-size:14px;font-weight:bold;cursor:pointer}
.generate{background:linear-gradient(145deg,#e94560,#ff6b6b);color:#fff}
.copy{background:linear-gradient(145deg,#00c851,#00a044);color:#fff}
.copy.copied{background:#666}
.info{text-align:center;color:#888;font-size:11px;margin-top:10px}
</style>
</head>
<body>
<div class="container">
<h1>🎰 彩票号码生成器</h1>

<div class="type-btns">
<button class="type-btn active" onclick="setType('ssq')">双色球</button>
<button class="type-btn" onclick="setType('dlt')">大乐透</button>
<button class="type-btn" onclick="setType('kl8')">快乐8</button>
</div>

<div class="panel">
<div class="ptitle">🔥 热冷号分析</div>
<div class="status" id="status">加载中...</div>
<button onclick="fetchData()" style="padding:6px 12px;background:#ffd700;color:#333;border:none;border-radius:6px;cursor:pointer;font-size:12px">🔄 刷新数据</button>
<div style="margin-top:10px">
<div class="hlist" id="hotList"></div>
<div class="clist" id="coldList"></div>
</div>
<div class="slider-row">
<label>热冷比例:</label>
<input type="range" id="ratio" min="0" max="10" value="7" oninput="updateRatio()">
<span id="ratioDisplay">7</span>
<span>:冷</span>
</div>
</div>

<div class="numbers" id="numbers"></div>

<div class="btns">
<button class="generate" onclick="generate()">🎲 生成</button>
<button class="copy" id="copyBtn" onclick="copyNumbers()">📋 复制</button>
</div>

<div class="info" id="info">✨ 命运掌握在你手中 ✨</div>
</div>

<script>
// 全局变量
var currentType = 'ssq';
var redHistory = {};
var blueHistory = {};
var lastDraws = [];

// 彩种配置
var CONFIG = {
    ssq: { redCount: 6, redTotal: 33, blueCount: 1, blueTotal: 16, name: '双色球' },
    dlt: { redCount: 5, redTotal: 35, blueCount: 2, blueTotal: 12, name: '大乐透' },
    kl8: { redCount: 10, redTotal: 80, blueCount: 0, blueTotal: 0, name: '快乐8' }
};

// 预设数据
var PRESET_DATA = {
    ssq: [
        [3,9,16,18,24,32,4],[1,4,13,17,26,32,9],[5,11,22,27,30,33,14],[8,12,15,21,25,28,2],
        [2,7,13,19,24,31,6],[4,10,14,22,27,29,11],[1,6,11,18,23,30,5],[3,9,15,20,26,33,8],
        [5,12,17,19,28,32,3],[2,7,14,21,25,31,7],[4,8,13,16,24,29,12],[6,10,18,22,27,30,1],
        [1,5,11,15,23,28,9],[3,7,14,19,26,32,4],[2,9,12,17,20,33,6],[4,6,13,18,24,31,10],
        [5,8,15,21,27,29,3],[1,10,14,19,25,30,8],[3,7,11,16,22,28,5],[2,6,12,17,23,32,13],
        [4,9,13,20,26,33,2],[5,10,15,18,24,29,7],[1,8,14,21,27,31,11],[3,6,11,19,25,30,6],
        [2,7,12,16,22,28,4],[4,9,14,18,23,32,9],[5,10,13,17,20,29,1],[1,6,11,15,24,31,8],
        [3,8,12,19,26,33,5],[2,7,14,21,27,30,10]
    ],
    dlt: [
        [[3,8,15,22,31],[4,11]],[[1,6,12,19,28],[3,9]],[[5,9,14,24,32],[2,7]],[[2,7,11,18,27],[5,12]],[[4,10,16,21,29],[1,8]],
        [[3,8,13,20,25],[4,10]],[[1,6,15,23,30],[2,11]],[[5,9,12,19,33],[3,7]],[[2,7,14,22,28],[5,9]],[[4,8,11,17,26],[1,12]],
        [[3,10,16,24,31],[4,8]],[[1,6,13,20,29],[2,6]],[[5,9,15,18,27],[3,11]],[[2,7,12,21,32],[5,10]],[[4,8,14,19,25],[1,7]],
        [[3,10,17,23,30],[4,9]],[[1,6,11,16,28],[2,12]],[[5,9,13,22,33],[3,8]],[[2,7,15,20,29],[5,11]],[[4,8,12,18,26],[1,6]],
        [[3,10,14,24,31],[4,10]],[[1,6,16,19,27],[2,7]],[[5,9,11,21,30],[3,9]],[[2,7,13,17,25],[5,12]],[[4,8,15,23,32],[1,8]]
    ],
    kl8: [
        [3,7,12,18,24,29,33,38,42,48],[5,8,11,15,21,27,32,36,41,45],[2,6,9,14,19,23,28,34,39,44],
        [4,10,13,17,22,26,31,35,40,46],[1,5,8,11,16,20,25,30,37,43],[6,9,12,15,18,24,29,33,38,42],
        [3,7,10,14,19,22,27,31,36,41],[2,8,11,16,21,25,28,34,39,44],[5,9,13,17,23,26,32,37,40,45],[1,6,10,14,18,20,24,30,35,42]
    ]
};

// 初始化
function setType(t) {
    currentType = t;
    document.querySelectorAll('.type-btn').forEach(function(b) { b.classList.remove('active'); });
    event.target.classList.add('active');
    loadPresetData();
    generate();
}

function updateRatio() {
    var v = document.getElementById('ratio').value;
    document.getElementById('ratioDisplay').textContent = v;
}

// 加载预设数据
function loadPresetData() {
    redHistory = {};
    blueHistory = {};
    lastDraws = [];
    
    var data = PRESET_DATA[currentType];
    if (!data) return;
    
    if (currentType === 'ssq') {
        data.forEach(function(d) {
            var reds = d.slice(0, 6);
            var blue = d[6];
            lastDraws.push({ reds: reds, blue: blue });
            reds.forEach(function(n) { redHistory[n] = (redHistory[n] || 0) + 1; });
            blueHistory[blue] = (blueHistory[blue] || 0) + 1;
        });
    } else if (currentType === 'dlt') {
        data.forEach(function(d) {
            var reds = d[0];
            var blues = d[1];
            lastDraws.push({ reds: reds, blues: blues });
            reds.forEach(function(n) { redHistory[n] = (redHistory[n] || 0) + 1; });
            blues.forEach(function(n) { blueHistory[n] = (blueHistory[n] || 0) + 1; });
        });
    } else if (currentType === 'kl8') {
        data.forEach(function(nums) {
            lastDraws.push({ numbers: nums });
            nums.forEach(function(n) { redHistory[n] = (redHistory[n] || 0) + 1; });
        });
    }
    
    updateHotcoldDisplay();
    document.getElementById('status').textContent = '✅ 已加载' + lastDraws.length + '期预设数据';
}

// 刷新数据（尝试网络获取）
async function fetchData() {
    var status = document.getElementById('status');
    status.textContent = '⏳ 正在获取...';
    
    // 先用预设数据
    setTimeout(function() {
        loadPresetData();
        status.textContent = '✅ 数据已刷新';
    }, 500);
}

// 更新热冷显示
function updateHotcoldDisplay() {
    var hl = document.getElementById('hotList');
    var cl = document.getElementById('coldList');
    
    var entries = Object.keys(redHistory).map(function(k) { return { n: parseInt(k), c: redHistory[k] }; });
    entries.sort(function(a, b) { return b.c - a.c; });
    
    var hot = entries.slice(0, 6);
    var cold = entries.slice(-6);
    
    hl.innerHTML = '<span style="font-size:11px;color:#888;margin-right:5px">🔥热:</span>' + 
        hot.map(function(e) { 
            return '<div class="hball">' + String(e.n).padStart(2, '0') + '</div>'; 
        }).join('');
    
    cl.innerHTML = '<span style="font-size:11px;color:#888;margin-right:5px">❄️冷:</span>' + 
        cold.map(function(e) { 
            return '<div class="hball cold">' + String(e.n).padStart(2, '0') + '</div>'; 
        }).join('');
}

// 根据滑块值和彩种计算热权重
function getHotWeight() {
    var sliderVal = parseInt(document.getElementById('ratio').value);
    var config = CONFIG[currentType];
    
    // 基础权重: 0-10 -> 0.5-1.5
    var baseWeight = sliderVal / 10 + 0.5;
    
    // 根据红球数量调整
    // 公式: 基础权重 × (红球数/总球数) × 10
    var ratio = baseWeight * (config.redCount / config.redTotal) * 10;
    
    // 限制范围
    return Math.max(0.5, Math.min(2.5, ratio));
}

// 加权随机
function weightedPick(count, max, hotWeight) {
    var pool = [];
    for (var i = 1; i <= max; i++) pool.push(i);
    
    var weights = pool.map(function(n) { 
        return (redHistory[n] || 0) * hotWeight + 1; 
    });
    
    var total = weights.reduce(function(a, b) { return a + b; }, 0);
    var result = [];
    
    for (var i = 0; i < count && pool.length > 0; i++) {
        var r = Math.random() * total;
        var sum = 0;
        for (var j = 0; j < pool.length; j++) {
            sum += weights[j];
            if (sum >= r) {
                result.push(pool[j]);
                total -= weights[j];
                pool.splice(j, 1);
                weights.splice(j, 1);
                break;
            }
        }
    }
    return result;
}

// 普通随机
function randomPick(count, max) {
    var pool = [];
    for (var i = 1; i <= max; i++) pool.push(i);
    var result = [];
    for (var i = 0; i < count; i++) {
        var idx = Math.floor(Math.random() * pool.length);
        result.push(pool.splice(idx, 1)[0]);
    }
    return result;
}

// 生成号码
function generate() {
    var config = CONFIG[currentType];
    var hotWeight = getHotWeight();
    var useHot = Object.keys(redHistory).length > 0;
    
    var html = '';
    
    if (currentType === 'ssq') {
        var reds = useHot ? weightedPick(6, 33, hotWeight).sort(function(a, b) { return a - b; }) : randomPick(6, 33).sort(function(a, b) { return a - b; });
        var blue = useHot ? (function() {
            var pool = []; for (var i = 1; i <= 16; i++) pool.push({ n: i, w: (blueHistory[i] || 0) + 1 });
            var total = pool.reduce(function(a, b) { return a + b.w; }, 0);
            var r = Math.random() * total, sum = 0;
            for (var j = 0; j < pool.length; j++) { sum += pool[j].w; if (sum >= r) return pool[j].n; }
            return Math.floor(Math.random() * 16) + 1;
        })() : Math.floor(Math.random() * 16) + 1;
        
        html += reds.map(function(n) { return '<div class="ball">' + String(n).padStart(2, '0') + '</div>'; }).join('');
        html += '<span style="color:#888;font-size:20px;margin:0 5px">+</span>';
        html += '<div class="ball blue">' + String(blue).padStart(2, '0') + '</div>';
        
    } else if (currentType === 'dlt') {
        var reds = useHot ? weightedPick(5, 35, hotWeight).sort(function(a, b) { return a - b; }) : randomPick(5, 35).sort(function(a, b) { return a - b; });
        var blues = randomPick(2, 12).sort(function(a, b) { return a - b; });
        
        html += reds.map(function(n) { return '<div class="ball">' + String(n).padStart(2, '0') + '</div>'; }).join('');
        html += '<span style="color:#888;font-size:20px;margin:0 5px">+</span>';
        html += blues.map(function(n) { return '<div class="ball blue">' + String(n).padStart(2, '0') + '</div>'; }).join('');
        
    } else if (currentType === 'kl8') {
        var nums = useHot ? weightedPick(10, 80, hotWeight).sort(function(a, b) { return a - b; }) : randomPick(10, 80).sort(function(a, b) { return a - b; });
        html += nums.map(function(n) { return '<div class="ball blue" style="width:32px;height:32px;font-size:12px">' + String(n).padStart(2, '0') + '</div>'; }).join('');
    }
    
    document.getElementById('numbers').innerHTML = html;
    document.getElementById('info').textContent = CONFIG[currentType].name + ' | 热权重:' + hotWeight.toFixed(2);
}

// 复制
function copyNumbers() {
    var html = document.getElementById('numbers').innerHTML;
    var div = document.createElement('div');
    div.innerHTML = html;
    var text = '';
    div.querySelectorAll('.ball').forEach(function(b) { text += b.textContent + ' '; });
    
    navigator.clipboard.writeText(text.trim()).then(function() {
        var btn = document.getElementById('copyBtn');
        btn.textContent = '✅ 已复制';
        btn.classList.add('copied');
        setTimeout(function() {
            btn.textContent = '📋 复制';
            btn.classList.remove('copied');
        }, 1500);
    });
}

// 启动
loadPresetData();
generate();
</script>
</body>
</html>
